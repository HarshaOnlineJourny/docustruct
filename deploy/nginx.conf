# /etc/nginx/sites-available/docustruct
#
# DocuStruct nginx site. Reverse-proxies docustruct.theproapps.com -> the
# Node server on 127.0.0.1:4000. Adds HTTP basic auth to gate the closed
# beta. TLS is provisioned automatically by certbot — see DEPLOY.md.
#
# After saving this file:
#   sudo ln -s /etc/nginx/sites-available/docustruct /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name docustruct.theproapps.com;

    # certbot will rewrite this block to redirect to https. Keep this
    # plain-HTTP file in place for the initial cert provisioning.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docustruct.theproapps.com;

    # certbot fills in these two lines on first run.
    # ssl_certificate     /etc/letsencrypt/live/docustruct.theproapps.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/docustruct.theproapps.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # PDF uploads can be a few MB.
    client_max_body_size 30M;

    # HTTP basic auth gate. Generate the password file with:
    #   sudo apt install apache2-utils
    #   sudo htpasswd -c /etc/nginx/.htpasswd-docustruct alice
    #   sudo htpasswd    /etc/nginx/.htpasswd-docustruct bob
    auth_basic           "DocuStruct closed beta";
    auth_basic_user_file /etc/nginx/.htpasswd-docustruct;

    # Health endpoint should NOT require auth (so uptime checks work).
    location = /api/health {
        auth_basic off;
        proxy_pass         http://127.0.0.1:4000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Long timeouts for large PDF imports / AI calls.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # WebSocket support (not used today but harmless).
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }

    # Lightweight gzip for the client bundle.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml;
    gzip_min_length 1024;
}
